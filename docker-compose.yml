services:

  # 1) 필요할 때만 수동 실행할 전처리 서비스
  osrm-preprocess:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: dogwalk-osrm-preprocess
    working_dir: /data
    volumes:
      - ./osrm/data:/data
    command:
      - sh
      - -lc
      - |
        set -e
        if [ ! -f /data/south-korea.osm.pbf ]; then
          echo "❌ /data/south-korea.osm.pbf 파일이 없습니다."
          exit 1
        fi

        echo "==> extract"
        osrm-extract -p /opt/foot.lua /data/south-korea.osm.pbf

        echo "==> partition"
        osrm-partition /data/south-korea.osrm

        echo "==> customize"
        osrm-customize /data/south-korea.osrm

        echo "✅ OSRM preprocess 완료"
    restart: "no"
    profiles: ["preprocess"]

  # 2) OSRM 라우팅 서버
  osrm-routed:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: dogwalk-osrm
    working_dir: /data
    volumes:
      - ./osrm/data:/data
    command: ["osrm-routed", "--algorithm", "mld", "/data/south-korea.osrm"]
    ports:
      - "5000:5000"
    restart: unless-stopped
